name: Build Aseprite
on: [workflow_dispatch]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: 'recursive'
      - uses: aseprite/get-skia@main
        with:
          skia-variant: m102
      - uses: ilammy/msvc-dev-cmd@v1
      - uses: cmake-helpers/setup-ninja@v1
      - name: Generating Makefiles
        run: |
          mkdir build
          cd build
          cmake -G Ninja -DLAF_BACKEND=skia -DSKIA_DIR=./skia -DSKIA_LIBRARY_DIR=./skia/out/Release-x64 -DSKIA_LIBRARY=./skia/out/Release-x64/skia.lib ..
      - name: Compiling
        run: |
          cd build
          ninja aseprite
      - name: Uploading Artifact
        uses: actions/upload-artifact@v3
        with:
          name: aseprite-build
          path: build/bin
